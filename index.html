<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Me perdonas Georgina de mi vida? 💗</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    margin-top: 30px;
    background: linear-gradient(#ffe6f0, #ffccd5);
    overflow: hidden;
  }

  h1 {
    font-size: 32px;
    animation: fadeIn 2s ease;
  }

  img {
    width: 280px;
    border-radius: 20px;
    margin-bottom: 20px;
    animation: fadeIn 2s ease;
  }

  button {
    padding: 20px 40px;
    font-size: 22px;
    margin: 15px;
    cursor: pointer;
    border: none;
    border-radius: 15px;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  #siButton {
    background-color: #ff4d88;
    color: white;
  }

  #noButton {
    background-color: #444;
    color: white;
    position: absolute;
  }

  #message {
    display: none;
    margin-top: 20px;
    font-size: 24px;
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  .heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
  }

  @keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-800px);}
  }
</style>

<script>
function showThankYouMessage() {
    document.getElementById('message').style.display = 'block';
    document.getElementById('siButton').style.display = 'none';
    document.getElementById('noButton').style.display = 'none';
    document.getElementById('title').style.display = 'none';
}

function moveNoButton() {
    const noButton = document.getElementById('noButton');

    const width = window.innerWidth - noButton.offsetWidth;
    const height = window.innerHeight - noButton.offsetHeight;

    const x = Math.random() * width;
    const y = Math.random() * height;

    noButton.style.left = x + 'px';
    noButton.style.top = y + 'px';
}

function dodgeButton() {
    moveNoButton();
}

function createHearts() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHearts, 300);
</script>

</head>

<body>

<img src="https://i.imgur.com/8Km9tLL.png">

<h1 id="title">georgina mi amor, perdóname la vida 💗</h1>

<button id="siButton" onclick="showThankYouMessage()">Sí 💗</button>

<button id="noButton" 
onmouseover="dodgeButton()" 
ontouchstart="dodgeButton()">
No, te odio Arturo 💔
</button>

<div id="message">
  <p>Muchas gracias mi Danita hermosa, te amo 💗</p>
  <p>Si tu respuesta fue sí es porque me amas, yo sabía 😘</p>
</div>

</body>
</html>
